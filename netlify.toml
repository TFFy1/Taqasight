[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to the Fusion AI orchestrator webhooks (CORS-free).
# Endpoint-to-webhook mapping lives here, never in components.
# First matching rule wins: specific endpoints first, generic fallback last.
[[redirects]]
  from = "/api/analyze"
  to = "https://stg-orch-api.abafusion.ai/webhook/webhook-bir6qybpaazi77sq2wxolq5x/analyze"
  status = 200

# /api/latest is served by netlify/functions/latest.mts (config.path),
# which reads the cache Google Sheet directly — no orchestrator webhook.

[[redirects]]
  from = "/api/*"
  to = "https://stg-orch-api.abafusion.ai/webhook/:splat"
  status = 200

# SPA fallback — client-side routing handles everything else.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
