name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm run build = tsc --noEmit && vite build (the project's quality gate)
      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to Netlify (production)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Skips gracefully until NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID are set,
      # so this workflow also coexists with Netlify's native Git integration.
      - name: Check deploy credentials
        id: creds
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID repo secrets not set — skipping deploy step."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.configured == 'true'
        with:
          node-version: 22

      - name: Download dist
        if: steps.creds.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # checkout provides netlify.toml so redirects (/api proxy, SPA fallback) ship too
      - name: Deploy
        if: steps.creds.outputs.configured == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx --yes netlify-cli@26 deploy --prod --dir dist
          --message "GitHub Actions ${{ github.sha }}"
